services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "8080:8080"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      WEBUI_NAME: ${WEBUI_NAME:-Local AI}
    volumes:
      - open-webui:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080', timeout=3)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.rendered.yml run
    depends_on:
      open-webui:
        condition: service_healthy
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    restart: unless-stopped

volumes:
  open-webui:
